name: Update DXCC Data

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "lib/adif-processor.js"
      - "lib/account-summary.js"
      - "bin/update-stats"
  schedule:
   - cron: '0 2 * * *' # Execute daily at UTC 02:00 AM
  workflow_dispatch: # Support manual trigger
    inputs:
      full_update:
        description: "Full Update"
        required: false
        default: false
        type: boolean

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          path: main

      - name: Checkout stats branch for data
        id: sync_data
        uses: actions/checkout@v5
        with:
          ref: stats
          path: main/local-data
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        working-directory: ./main
        run: npm ci

      - name: Run DXCC update
        working-directory: ./main
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.full_update }}" = "true" ] || [ "${{ steps.sync_data.outcome }}" != "success" ]; then
            echo "Performing full update..."
            node ./bin/update-stats --full
          else
            echo "Performing incremental update..."
            node ./bin/update-stats
          fi
        env:
          LOTW_USERNAME: ${{ secrets.LOTW_USERNAME }}
          LOTW_PASSWORD: ${{ secrets.LOTW_PASSWORD }}

      - name: Deploy data to stats branch
        if: success()
        run: |
          cd main/local-data
          # 多呼号场景下数据存放在 <callsign>/ 子目录里，因此递归搜索数据文件
          if [ ! "$(find . -type f \( -name '*.json' -o -name '*.adif' -o -name '*.adi' -o -name '*.txt' -o -name '*.md' -o -name '*.svg' \) ! -path './.git/*' 2>/dev/null)" ]; then
            echo "No data files to deploy."
            exit 0
          fi
          rm -rf .git
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout -b stats
          # 生成 README.md：标题 + 文件列表 + DXCC 增长图
          echo "# DXCC Statistics Data" > README.md
          echo "" >> README.md
          echo "Last updated: $(date -u)" >> README.md
          echo "" >> README.md
          echo "## Files in this branch" >> README.md
          echo "" >> README.md
          find . -maxdepth 2 -type f ! -name 'README.md' ! -path './.git/*' \
            | sed 's|^\./|- |' >> README.md 2>/dev/null || true
          echo "" >> README.md
          # 嵌入每个呼号的 DXCC 增长图（SVG 图片引用）
          for chart in $(find . -maxdepth 2 -name 'lotwDxccGrowth.svg' | sort); do
            callsign_dir=$(dirname "$chart" | sed 's|^\./||')
            echo "" >> README.md
            echo "---" >> README.md
            echo "" >> README.md
            echo "## DXCC Growth — ${callsign_dir}" >> README.md
            echo "" >> README.md
            echo "![DXCC Growth Chart](${chart})" >> README.md
            echo "" >> README.md
          done
          # 嵌入每个呼号的 DXCC By Band 统计链接
          for bandmd in $(find . -maxdepth 2 -name 'lotwDxccByBand.md' | sort); do
            callsign_dir=$(dirname "$bandmd" | sed 's|^\./||')
            echo "" >> README.md
            echo "---" >> README.md
            echo "" >> README.md
            echo "## DXCC by Band — ${callsign_dir}" >> README.md
            echo "" >> README.md
            echo "See [lotwDxccByBand.md](${bandmd}) for full band-by-band DXCC details and Challenge score." >> README.md
            echo "" >> README.md
          done
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Update DXCC data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push --force origin stats
            echo "Data files successfully deployed to stats branch."
          else
            echo "No changes to commit."
          fi
